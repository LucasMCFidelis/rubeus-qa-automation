name: Cypress E2E Tests

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke tests
        run: CYPRESS_INCLUDE_TAGS=SMOKE npx cypress run
        env:
          CYPRESS_INCLUDE_TAGS: SMOKE

      - name: Upload Smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            cypress/screenshots
          retention-days: 7

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Regression tests
        run: CYPRESS_INCLUDE_TAGS=REGRESSION npx cypress run
        env:
          CYPRESS_INCLUDE_TAGS: REGRESSION

      - name: Upload Regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: |
            cypress/screenshots
          retention-days: 7